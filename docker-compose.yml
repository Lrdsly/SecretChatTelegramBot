services:
  # --- MariaDB Database Service ---
  db:
    image: mariadb:11.8
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "172.17.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 5s
      retries: 10

  # --- Redis Cache Service ---
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  # --- Your Telegram Bot Service ---
  bot:
    build: .
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy 
      redis:
        condition: service_healthy
    env_file:
      - .env

volumes:
  mariadb_data: